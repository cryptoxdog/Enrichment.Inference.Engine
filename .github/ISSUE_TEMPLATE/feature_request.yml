name: Feature Request
description: Propose a new capability
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: "## Feature Request"

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered

  - type: dropdown
    id: layer
    attributes:
      label: Which layer?
      options:
        - Enrichment pipeline
        - Inference engine
        - API / ingress
        - Odoo module
        - CI / tooling
        - Other
