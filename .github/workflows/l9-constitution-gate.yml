# L9 Constitution Gate — verifies node.constitution.yaml, inventories, and contract-bound PR edits.
# Human-maintained accuracy matrix: docs/contracts/VERIFICATION_MATRIX.md

name: L9 Constitution Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  constitution-verify:
    name: Constitution Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest fastapi

      - name: Verify node constitution alignment
        run: |
          python scripts/verify_node_constitution.py

  tier2-attestation-tests:
    name: Tier 2 Constitution + Attestation Tests
    runs-on: ubuntu-latest
    needs:
      - constitution-verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest pytest-cov fastapi

      - name: Run Tier 2 constitution tests
        run: |
          pytest tests/contracts/tier2/test_node_constitution_contract.py \
            tests/contracts/tier2/test_runtime_attestation_contract.py \
            -q --disable-warnings --maxfail=1 -o addopts=""

  contract-bound-change-gate:
    name: Contract-Bound Change Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - constitution-verify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate contract-bound changes
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          base_ref = os.environ["BASE_REF"]
          head_ref = os.environ["HEAD_REF"]

          diff = subprocess.check_output(
              ["git", "diff", "--name-only", base_ref, head_ref],
              text=True,
          ).splitlines()

          contract_bound_prefixes = (
              "app/api/v1/",
              "app/agents/",
              "app/engines/",
              "app/services/",
              "chassis/",
          )
          contract_files_prefixes = (
              "docs/contracts/",
              "tests/contracts/",
              "scripts/verify_node_constitution.py",
          )

          touched_bound = [
              path for path in diff if path.startswith(contract_bound_prefixes)
          ]
          touched_contracts = [
              path
              for path in diff
              if path.startswith(contract_files_prefixes)
          ]

          summary_lines = []
          summary_lines.append("## L9 Constitution Review Signal")
          summary_lines.append("")
          summary_lines.append("### Changed files")
          for path in diff:
              summary_lines.append(f"- `{path}`")

          summary_lines.append("")
          summary_lines.append("### Contract-bound surfaces")
          if touched_bound:
              for path in touched_bound:
                  summary_lines.append(f"- `{path}`")
          else:
              summary_lines.append("- none")

          summary_lines.append("")
          summary_lines.append("### Contract/test surfaces")
          if touched_contracts:
              for path in touched_contracts:
                  summary_lines.append(f"- `{path}`")
          else:
              summary_lines.append("- none")

          step_summary = os.environ.get("GITHUB_STEP_SUMMARY")
          if step_summary:
              with open(step_summary, "a", encoding="utf-8") as handle:
                  handle.write("\n".join(summary_lines) + "\n")

          if touched_bound and not touched_contracts:
              print(
                  "Contract-bound application files changed without corresponding "
                  "docs/contracts, tests/contracts, or constitution verifier updates.",
                  file=sys.stderr,
              )
              sys.exit(1)
          PY
