name: L9 Constitution Gate

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  constitution-verify:
    name: Constitution Verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install validation dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest fastapi

      - name: Verify node constitution alignment
        run: |
          python scripts/verify_node_constitution.py

  tier2-attestation-tests:
    name: Tier 2 Constitution + Attestation Tests
    runs-on: ubuntu-latest
    needs:
      - constitution-verify
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest fastapi

      - name: Run Tier 2 constitution tests
        run: |
          pytest tests/contracts/tier2/test_node_constitution_contract.py \
            tests/contracts/tier2/test_runtime_attestation_contract.py \
            -q --disable-warnings --maxfail=1

  contract-bound-change-gate:
    name: Contract-Bound Change Gate
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - constitution-verify
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Evaluate contract-bound changes
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          python - <<'PY'
          import os
          import subprocess
          import sys

          base_ref = os.environ['BASE_REF']
          head_ref = os.environ['HEAD_REF']

          diff = subprocess.check_output(
              ['git', 'diff', '--name-only', base_ref, head_ref],
              text=True,
          ).splitlines()

          contract_bound_prefixes = (
              'app/api/v1/',
              'app/agents/',
              'app/engines/',
              'app/services/',
              'chassis/',
          )
          contract_files_prefixes = (
              'docs/contracts/',
              'tests/contracts/',
          )

          contract_bound_files = [
              path for path in diff if path.startswith(contract_bound_prefixes)
          ]
          companion_files = [
              path for path in diff if path.startswith(contract_files_prefixes)
          ]

          if contract_bound_files and not companion_files:
              print('[constitution-gate] contract-bound change without contract/test companion files')
              for path in contract_bound_files:
                  print(f' - {path}')
              raise SystemExit(1)

          print('[constitution-gate] contract-bound change gate passed')
          PY
