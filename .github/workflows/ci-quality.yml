# =============================================================================
# CI Quality Gates — Reusable Workflow (Repo-Agnostic)
#
# Drop into .github/workflows/ci-quality.yml of ANY Python project.
# All project-specific values come from repository variables/secrets.
#
# Required GitHub Secrets:
#   CODECOV_TOKEN        — Codecov upload token
#
# Required GitHub Variables (Settings → Variables):
#   PYTHON_VERSION       — Python version (e.g. "3.12")
#
# Optional GitHub Variables:
#   TEST_DB_IMAGE        — Postgres image (default: postgres:16)
#   TEST_DB_USER         — Test DB user (default: test)
#   TEST_DB_PASSWORD     — Test DB password (default: test)
#   TEST_DB_NAME         — Test DB name (default: test_db)
#   COVERAGE_THRESHOLD   — Min coverage % (default: 75)
#   TEST_EXTRA_DEPS      — Extra pip deps for tests (space-separated)
#   SOURCE_DIRS          — Directories to scan (default: ".")
#   SEMGREP_RULES_PATH   — Path to custom semgrep rules (default: .semgrep/)
#
# Usage:
#   1. Copy this file to .github/workflows/ci-quality.yml
#   2. Set secrets and variables in GitHub repo settings
#   3. Add these job names to your existing ci-complete "needs:" list
# =============================================================================

name: Quality Gates

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}

jobs:

  # ===========================================================================
  # LINT-FORMAT — Ruff + MyPy
  # ===========================================================================
  lint-format:
    name: Lint & Format (Ruff + MyPy)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install linters
        run: |
          python -m pip install --upgrade pip
          pip install "ruff==0.15.5" mypy

      - name: Ruff (lint)
        run: ruff check . --output-format=github

      - name: Ruff (format)
        run: ruff format --check .

      - name: MyPy (type check)
        run: mypy . --config-file=pyproject.toml || true
        continue-on-error: true

  # ===========================================================================
  # SEMGREP — Custom Policy Rules
  # ===========================================================================
  semgrep:
    name: Semgrep Policy Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: ${{ vars.SEMGREP_RULES_PATH || '.semgrep/' }}
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN || '' }}

  # ===========================================================================
  # SECRETS-SCAN — GitGuardian Secrets Detection
  # ===========================================================================
  secrets-scan:
    name: Secrets Scan (GitGuardian)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: GitGuardian scan
        uses: GitGuardian/ggshield-action@v1
        env:
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_PULL_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}

  # ===========================================================================
  # COVERAGE — Codecov with DB services
  # ===========================================================================
  coverage:
    name: Coverage (Codecov)
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: ${{ vars.TEST_DB_IMAGE || 'postgres:16' }}
        env:
          POSTGRES_USER: ${{ vars.TEST_DB_USER || 'test' }}
          POSTGRES_PASSWORD: ${{ vars.TEST_DB_PASSWORD || 'test' }}
          POSTGRES_DB: ${{ vars.TEST_DB_NAME || 'test_db' }}
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e . 2>/dev/null || pip install -r requirements.txt 2>/dev/null || true
          pip install pytest pytest-asyncio pytest-cov httpx
          # Install any project-specific test deps
          if [ -n "${{ vars.TEST_EXTRA_DEPS }}" ]; then
            pip install ${{ vars.TEST_EXTRA_DEPS }}
          fi

      - name: Run tests with coverage
        env:
          DATABASE_URL: postgresql://${{ vars.TEST_DB_USER || 'test' }}:${{ vars.TEST_DB_PASSWORD || 'test' }}@localhost:5432/${{ vars.TEST_DB_NAME || 'test_db' }}
          REDIS_URL: redis://localhost:6379
          TESTING: "true"
        run: pytest tests/ -v --cov=. --cov-report=xml --cov-report=term --ignore=tests/e2e

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true

  # ===========================================================================
  # YAML-VALIDATE — YAML Linting
  # ===========================================================================
  yaml-validate:
    name: YAML Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate YAML files
        run: |
          pip install yamllint
          yamllint -c .yamllint.yml . 2>/dev/null || yamllint . || true
        continue-on-error: true

  # ===========================================================================
  # L9-CONTRACT-AUDIT — 27-Rule Engine Scanner
  # ===========================================================================
  l9-contract-audit:
    name: L9 Contract Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run L9 Audit Engine
        run: |
          if [ -f tools/audit_engine.py ]; then
            python tools/audit_engine.py --strict
          else
            echo "audit_engine.py not found, skipping"
          fi

      - name: Run L9 Contract Verification
        run: |
          if [ -f tools/verify_contracts.py ]; then
            python tools/verify_contracts.py
          else
            echo "verify_contracts.py not found, skipping"
          fi

  # ===========================================================================
  # ARCHITECTURE-GUARD — Block FastAPI in Engine Modules
  # ===========================================================================
  architecture-guard:
    name: Architecture Guard
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Block FastAPI imports in engine modules
        run: |
          echo "Checking for FastAPI imports in engine modules..."
          VIOLATIONS=$(find app -name "*.py" \
            ! -path "app/api/*" \
            ! -name "main.py" \
            ! -name "handlers.py" \
            -exec grep -l "from fastapi import\|import fastapi" {} \; 2>/dev/null || true)

          if [ -n "$VIOLATIONS" ]; then
            echo "❌ FastAPI imports found in engine modules:"
            echo "$VIOLATIONS"
            echo ""
            echo "FastAPI imports are only allowed in: app/api/, app/main.py, handlers.py"
            exit 1
          fi
          echo "✅ No FastAPI imports in engine modules"

      - name: Check terminology consistency
        run: |
          echo "Checking for banned patterns (print, Optional[], List[], Dict[])..."
          VIOLATIONS=0

          for pattern in "print(" "Optional\[" "List\[" "Dict\["; do
            FOUND=$(grep -r -l "$pattern" app/ tests/ 2>/dev/null | grep -v __pycache__ | grep -v ".pyc" || true)
            if [ -n "$FOUND" ]; then
              echo "⚠️  Found '$pattern' in:"
              echo "$FOUND"
              VIOLATIONS=$((VIOLATIONS+1))
            fi
          done

          if [ $VIOLATIONS -gt 0 ]; then
            echo ""
            echo "❌ Use: structlog (not print), list[T] (not List[T]), T | None (not Optional[T])"
            exit 1
          fi
          echo "✅ Terminology check passed"

  # ===========================================================================
  # QUALITY-GATE — Aggregation job (add to your ci-complete "needs:")
  # ===========================================================================
  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    needs:
      - lint-format
      - semgrep
      - secrets-scan
      - coverage
      - yaml-validate
      - l9-contract-audit
      - architecture-guard
    if: always()

    steps:
      - name: Quality Gate Summary
        run: |
          echo "╔══════════════════════════════════════════════════════════════╗"
          echo "║              QUALITY GATE SUMMARY                           ║"
          echo "╚══════════════════════════════════════════════════════════════╝"
          echo ""
          echo "  ├─ Lint & Format:     ${{ needs.lint-format.result }}"
          echo "  ├─ Semgrep:           ${{ needs.semgrep.result }}"
          echo "  ├─ Secrets Scan:      ${{ needs.secrets-scan.result }}"
          echo "  ├─ Coverage:          ${{ needs.coverage.result }}"
          echo "  ├─ YAML Validate:     ${{ needs.yaml-validate.result }}"
          echo "  ├─ L9 Contract Audit: ${{ needs.l9-contract-audit.result }}"
          echo "  └─ Architecture Guard: ${{ needs.architecture-guard.result }}"
          echo ""

          # Fail on critical gates
          FAILED=false

          if [[ "${{ needs.lint-format.result }}" == "failure" ]]; then
            echo "❌ Lint & Format failed"; FAILED=true
          fi

          if [[ "${{ needs.secrets-scan.result }}" == "failure" ]]; then
            echo "❌ Secrets Scan failed (hardcoded secrets detected)"; FAILED=true
          fi

          if [[ "${{ needs.coverage.result }}" == "failure" ]]; then
            echo "❌ Coverage below threshold"; FAILED=true
          fi

          if [[ "${{ needs.l9-contract-audit.result }}" == "failure" ]]; then
            echo "❌ L9 Contract Audit failed"; FAILED=true
          fi

          if [[ "${{ needs.architecture-guard.result }}" == "failure" ]]; then
            echo "❌ Architecture Guard failed"; FAILED=true
          fi

          if [[ "$FAILED" == "true" ]]; then
            exit 1
          fi

          echo "✅ All quality gates passed"
