name: CI Pipeline

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # SHA: 692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@v5  # SHA: 39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Validate Python syntax
        run: python -m py_compile $(find app -name "*.py")
      - name: Validate YAML files
        run: python -m yaml $(find . -name "*.yml" -o -name "*.yaml")

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # SHA: 692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@v5  # SHA: 39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run Ruff
        run: ruff check .
      - name: Run MyPy
        run: mypy app/ || true  # WAIVER-001: non-blocking

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: test
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4  # SHA: 692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@v5  # SHA: 39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run tests
        run: pytest -v --cov=app --cov-report=xml --cov-report=term
        env:
          REDIS_URL: redis://localhost:6380/0
          DATABASE_URL: postgresql://postgres:test@localhost:5433/test
      - uses: codecov/codecov-action@v4  # SHA: 125fc84a9a348dbcf27191600683ec096ec9021c
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true  # WAIVER-005: non-blocking

  compliance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # SHA: 692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@v5  # SHA: 39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: '3.12'
      - name: Verify chassis boundary
        run: |
          if grep -r "from fastapi import" app/engines/ 2>/dev/null; then
            echo "ERROR: FastAPI import in engine/ violates CONTRACT 1"
            exit 1
          fi
      - name: Verify terminology
        run: |
          if grep -rE "\bprint\(|\bOptional\[|\bList\[|\bDict\[" app/ 2>/dev/null; then
            echo "ERROR: Forbidden terminology found"
            exit 1
          fi

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4  # SHA: 692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@v5  # SHA: 39cd14951b08e74b54015e9e001cdefcf80e669f
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run pip-audit
        run: pip-audit --require-hashes --disable-pip || true  # WAIVER-002: non-blocking
      - name: Run Bandit
        run: bandit -r app/ -ll || true  # WAIVER-004: non-blocking
