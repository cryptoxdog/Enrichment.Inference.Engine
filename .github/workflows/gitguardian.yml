# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci, security]
# tags: [gitguardian, secrets, telegram]
# owner: platform
# status: active
# --- /L9_META ---
# Secret scan via GitGuardian ggshield (GitHub-hosted runners).
#
# Configure:
#   Repository secret: GITGUARDIAN_API_KEY (service account or PAT with scan scope).
# Optional Telegram on scan failure only (TELEGRAM_BOT_TOKEN + TELEGRAM_CHAT_ID).
#
# If the API key is unset, the workflow succeeds without scanning (same pattern as SonarCloud gate).

name: GitGuardian

on:
  push:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
      - ${{ vars.DEVELOP_BRANCH || 'develop' }}
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  scan:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      did_run: ${{ steps.gate.outputs.run }}

    steps:
      - name: Decide whether to run GitGuardian
        id: gate
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
        run: |
          if [ -n "$GITGUARDIAN_API_KEY" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::GitGuardian skipped — add Actions secret GITGUARDIAN_API_KEY."
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Pull request metadata for ggshield
        if: steps.gate.outputs.run == 'true' && github.event_name == 'pull_request'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
        run: echo "GITHUB_PULL_BASE_SHA=${BASE_SHA}" >> "$GITHUB_ENV"

      - name: GitGuardian scan
        if: steps.gate.outputs.run == 'true'
        uses: GitGuardian/ggshield-action@v1
        env:
          GITGUARDIAN_API_KEY: ${{ secrets.GITGUARDIAN_API_KEY }}
          GITHUB_PUSH_BEFORE_SHA: ${{ github.event.before }}
          GITHUB_PUSH_BASE_SHA: ${{ github.event.base }}
          GITHUB_DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}

  telegram-notify:
    name: Telegram (GitGuardian)
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: scan
    if: always() && needs.scan.outputs.did_run == 'true' && needs.scan.result == 'failure'
    permissions:
      contents: read

    steps:
      - name: Checkout (tools only)
        uses: actions/checkout@v4

      - name: Send Telegram summary
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          TELEGRAM_CI_MESSAGE=$(printf '🛡 GitGuardian: failure\n\nRepo: %s\n%s' "$REPO" "$RUN_URL")
          export TELEGRAM_CI_MESSAGE
          python3 tools/telegram_send_message.py
