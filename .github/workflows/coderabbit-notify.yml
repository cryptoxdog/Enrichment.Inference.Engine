name: CodeRabbit Review Notify

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  contents: read

jobs:
  notify-l:
    if: github.event.review.user.login == 'coderabbitai[bot]' && github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Ping L on Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          REPO: ${{ github.repository }}
          PR_NUM: ${{ github.event.pull_request.number }}
        run: |
          MESSAGE=$'🐰 CodeRabbit review ready\n\nRepo: '"${REPO}"$'\nPR #'"${PR_NUM}"$': '"${PR_TITLE}"$'\n'"${PR_URL}"$'\n\nImplement fixes, verify CI, merge.'
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}" \
            --fail
