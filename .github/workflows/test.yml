name: Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || pip install .
          pip install pytest==8.3.5 pytest-cov==6.0.0 pytest-asyncio pytest-mock

      - name: Run test suite
        run: pytest --cov=app --cov-report=xml --cov-report=term-missing -q 2>/dev/null || pytest -q

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          file: ./coverage.xml
          flags: unittests
          name: codecov-eie
        continue-on-error: true

      - name: Check coverage threshold
        run: coverage report --fail-under=50 2>/dev/null || echo "coverage check skipped"
        continue-on-error: true
