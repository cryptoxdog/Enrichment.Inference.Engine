# Universal CI/CD Pack — CodeQL Analysis
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# VERSION: 1.0.0
# PURPOSE: GitHub CodeQL semantic code analysis for Python
# SIBLING PARITY: Cognitive.Engine.Graphs/codeql.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: CodeQL Analysis

on:
  push:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
  pull_request:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
  schedule:
    - cron: '0 4 * * 1'  # Weekly on Monday at 4 AM UTC

permissions:
  contents: read
  actions: read

jobs:
  analyze:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Required to upload SARIF / security findings (workflow-level read-only is not enough on some repos).
    permissions:
      contents: read
      security-events: write
      actions: read

    strategy:
      fail-fast: false
      matrix:
        language: ['python']

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: '/language:${{ matrix.language }}'

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
