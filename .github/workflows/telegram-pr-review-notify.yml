# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci]
# tags: [telegram, pr-review, integrations]
# owner: platform
# status: active
# --- /L9_META ---
# Telegram for non-CodeRabbit bot activity: GitHub Actions (e.g. Perplexity PR comment),
# Copilot PR reviewer, etc. CodeRabbit is skipped — see coderabbit-notify.yml only.
# Every message prefixes @QuantumAI_IgorBot (tools/telegram_visibility.py).
#
# Configure (same tokens as coderabbit-notify.yml):
#   Secret:   TELEGRAM_BOT_TOKEN
#   Variable: TELEGRAM_CHAT_ID
# Optional variable: TELEGRAM_REVIEW_NOTIFY_MODE = bots | all  (default bots)
# Optional variable: TELEGRAM_REVIEW_BOT_ALLOWLIST = comma-separated logins (overrides defaults)
#
# Script: tools/telegram_review_webhook.py

name: Telegram PR Review Notify

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]

permissions:
  contents: read
  pull-requests: read

jobs:
  notify-telegram:
    name: Post review activity to Telegram
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout (tools only)
        uses: actions/checkout@v4

      - name: Send Telegram notification
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ vars.TELEGRAM_CHAT_ID }}
          TELEGRAM_REVIEW_NOTIFY_MODE: ${{ vars.TELEGRAM_REVIEW_NOTIFY_MODE }}
          TELEGRAM_REVIEW_BOT_ALLOWLIST: ${{ vars.TELEGRAM_REVIEW_BOT_ALLOWLIST }}
        run: python3 tools/telegram_review_webhook.py
