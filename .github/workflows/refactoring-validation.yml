# DORA META: Refactoring Safety Gate (BLOCKING)
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# PURPOSE: HARD GATE for refactoring PRs — zero false positives allowed
# DEPENDENCIES: Ruff, Mypy, Pytest
# DEPLOYMENT: Runs on refactor/* branches only
# DORA METRICS: Zero regressions | Test coverage maintained
# SIBLING PARITY: Cognitive.Engine.Graphs/refactoring-validation.yml
# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

name: Refactoring Safety Gate

on:
  pull_request:
    branches:
      - ${{ vars.PRIMARY_BRANCH || 'main' }}
      - ${{ vars.DEVELOP_BRANCH || 'develop' }}
    paths:
      - '**/*.py'
  push:
    branches:
      - 'refactor/**'
  workflow_dispatch:

concurrency:
  group: refactor-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  PYTHON_VERSION: ${{ vars.PYTHON_VERSION || '3.12' }}
  SOURCE_DIR: ${{ vars.SOURCE_DIR || 'app' }}

jobs:
  refactor-gate:
    name: Refactoring Validation Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.head_ref, 'refactor/') || startsWith(github.ref, 'refs/heads/refactor/') || github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          pip install -e ".[dev]" 2>/dev/null || pip install -e . 2>/dev/null || true

      - name: Run Ruff Linter (BLOCKING)
        run: |
          ruff check . --output-format=github

      - name: Run Ruff Formatter Check (BLOCKING)
        run: |
          ruff format --check .

      - name: Run Mypy Type Checker (BLOCKING)
        run: |
          mypy ${{ env.SOURCE_DIR }}/ --show-error-codes --pretty --ignore-missing-imports

      - name: Run Full Test Suite (BLOCKING)
        run: |
          PYTHONPATH=. pytest -n auto \
            --cov=${{ env.SOURCE_DIR }} \
            --cov-report=term-missing \
            --cov-fail-under=60 \
            -v

      - name: Refactoring Gate Passed
        run: |
          echo "✅ All refactoring safety checks passed"
          echo "Safe to merge"

# ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
# END OF REFACTORING VALIDATION
