# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [ci]
# tags: [perplexity, pr-review, optional]
# owner: platform
# status: active
# --- /L9_META ---
# Optional advisory PR review via Perplexity (tools/perplexity_code_review.py).
#
# Setup: Repository secret PERPLEXITY_API_KEY (same as runtime enrichment).
# If unset, the job succeeds without running the review (does not block merges).
# Uses --no-block: findings are informational only.

name: Perplexity Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: perplexity-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  perplexity-review:
    name: AI diff review
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout (full history for diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect Perplexity API key
        id: key
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          if [ -n "$PERPLEXITY_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
            echo "PERPLEXITY_API_KEY is not set — skipping Perplexity code review."
          fi

      - name: Set up Python
        if: steps.key.outputs.present == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pyproject.toml

      - name: Install httpx
        if: steps.key.outputs.present == 'true'
        run: pip install "httpx>=0.27.0"

      - name: Build PR diff and run review
        id: run
        if: steps.key.outputs.present == 'true'
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: |
          set -euo pipefail
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          git diff "$BASE_SHA"..."$HEAD_SHA" > pr_diff.txt
          if [ ! -s pr_diff.txt ]; then
            echo "empty_diff=true" >> "$GITHUB_OUTPUT"
            echo "No diff — skipping review."
            exit 0
          fi
          echo "empty_diff=false" >> "$GITHUB_OUTPUT"
          if [ "$(wc -c < pr_diff.txt)" -gt 400000 ]; then
            head -c 400000 pr_diff.txt > pr_diff_small.txt
            mv pr_diff_small.txt pr_diff.txt
            echo "(diff truncated to 400KB for review)" > review_prologue.txt
          else
            : > review_prologue.txt
          fi
          set +e
          python3 tools/perplexity_code_review.py \
            --mode file \
            --diff-path pr_diff.txt \
            --no-block 2>&1 | tee review_output.txt
          RC=${PIPESTATUS[0]}
          set -e
          cat review_prologue.txt review_output.txt > review_combined.txt
          mv review_combined.txt review_output.txt
          echo "exit_code=$RC" >> "$GITHUB_OUTPUT"

      - name: Post or update PR comment
        if: steps.key.outputs.present == 'true' && steps.run.outputs.empty_diff != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");
            const marker = "<!-- perplexity-ai-review -->";
            const path = "review_output.txt";
            if (!fs.existsSync(path)) {
              core.info("No review output file; skipping comment.");
              return;
            }
            let body = fs.readFileSync(path, "utf8");
            const max = 60000;
            if (body.length > max) {
              body = body.slice(0, max) + "\n\n_(truncated for GitHub comment length)_";
            }
            const fullBody = `${marker}\n## Perplexity code review (advisory)\n\n\`\`\`text\n${body}\n\`\`\`\n\n_Job: ${context.runId} · Config: \`tools/perplexity_code_review.py\` + \`--no-block\`_`;

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find((c) =>
              c.user.type === "Bot" && c.body && c.body.includes(marker),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body: fullBody,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: fullBody,
              });
            }
