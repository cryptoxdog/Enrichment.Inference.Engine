name: L9 Contract Control

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  constitution-and-attestation:
    name: Constitution + Attestation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install control dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest fastapi

      - name: Verify constitution
        run: |
          python scripts/l9_contract_control.py verify-constitution

      - name: Verify attestation
        run: |
          python scripts/l9_contract_control.py verify-attestation

  review-signal:
    name: Review Signal
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    needs:
      - constitution-and-attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install review dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml

      - name: Emit review signal
        env:
          BASE_REF: ${{ github.event.pull_request.base.sha }}
          HEAD_REF: ${{ github.event.pull_request.head.sha }}
        run: |
          python scripts/l9_contract_control.py review-signal --base "$BASE_REF" --head "$HEAD_REF" | tee review_signal.md
          cat review_signal.md >> "$GITHUB_STEP_SUMMARY"

  select-and-run-gates:
    name: Select and Run Gates
    runs-on: ubuntu-latest
    needs:
      - constitution-and-attestation
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install gate dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pyyaml pytest fastapi

      - name: Compute changed files
        id: changed
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE="${{ github.event.pull_request.base.sha }}"
            HEAD="${{ github.event.pull_request.head.sha }}"
          else
            BASE="${{ github.event.before }}"
            HEAD="${{ github.sha }}"
          fi
          FILES="$(git diff --name-only "$BASE" "$HEAD" | tr '\n' ' ')"
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Select gates
        id: gates
        shell: bash
        run: |
          python scripts/l9_contract_control.py select-gates --files ${{ steps.changed.outputs.files }} > gates.json
          cat gates.json
          echo "json=$(python - <<'PY'
          import json
          print(json.dumps(json.load(open('gates.json'))))
          PY
          )" >> "$GITHUB_OUTPUT"

      - name: Run selected commands
        shell: bash
        run: |
          python - <<'PY'
          import json
          import subprocess

          payload = json.load(open('gates.json'))
          commands = payload.get('commands', [])
          if not commands:
              print('[l9-control] no matching gates selected')
              raise SystemExit(0)

          seen = set()
          ordered = []
          for command in commands:
              if command not in seen:
                  seen.add(command)
                  ordered.append(command)

          for command in ordered:
              print(f'[l9-control] running: {command}')
              completed = subprocess.run(command, shell=True)
              if completed.returncode != 0:
                  raise SystemExit(completed.returncode)
          PY
