# Inference Rules — Plastics Recycling Domain
# Loaded by InferenceBridge at startup.
# Each rule: requires → conditions → produces
# Aligned with graph DomainSpec: managed_by: computed

- name: material_grade_from_contamination
  requires:
    - contamination_tolerance
    - food_grade_certified
  min_confidence: 0.6
  conditions:
    - field: contamination_tolerance
      operator: exists
    - field: food_grade_certified
      operator: exists
  produces:
    material_grade:
      method: threshold
      source_field: contamination_tolerance
      thresholds:
        - max: 0.01
          label: "A+"
        - max: 0.02
          label: "A"
        - max: 0.05
          label: "B+"
        - max: 0.10
          label: "B"
        - max: 0.20
          label: "C"
      default: "D"
  confidence: 0.85

- name: facility_tier_from_capabilities
  requires:
    - process_types
    - materials_handled
    - equipment_list
  min_confidence: 0.5
  conditions:
    - field: process_types
      operator: exists
    - field: materials_handled
      operator: exists
  produces:
    facility_tier:
      method: lookup
      key_field: process_types
      table:
        "extrusion,injection": "processor-advanced"
        "extrusion": "processor-mid"
        "grinding": "processor-basic"
        "collection": "collector"
        "sorting": "mrf"
      default: "processor-basic"
  confidence: 0.80

- name: buyer_class_from_grade_and_volume
  requires:
    - material_grade
    - monthly_volume_lbs
  min_confidence: 0.6
  conditions:
    - field: material_grade
      operator: in
      value: ["A+", "A", "B+"]
    - field: monthly_volume_lbs
      operator: gte
      value: 50000
  produces:
    buyer_class:
      method: static
      value: "premium"
  confidence: 0.82

- name: buyer_class_standard
  requires:
    - material_grade
  min_confidence: 0.5
  conditions:
    - field: material_grade
      operator: in
      value: ["B", "B+", "C"]
  produces:
    buyer_class:
      method: static
      value: "standard"
  confidence: 0.75

- name: application_class_from_food_grade
  requires:
    - food_grade_certified
    - material_grade
  min_confidence: 0.6
  conditions:
    - field: food_grade_certified
      operator: eq
      value: true
    - field: material_grade
      operator: in
      value: ["A+", "A"]
  produces:
    application_class:
      method: static
      value: "food-contact"
  confidence: 0.88

- name: application_class_industrial
  requires:
    - food_grade_certified
  min_confidence: 0.4
  conditions:
    - field: food_grade_certified
      operator: eq
      value: false
  produces:
    application_class:
      method: static
      value: "industrial"
  confidence: 0.78

- name: mfi_range_from_process
  requires:
    - process_types
    - polymer_code
  min_confidence: 0.5
  conditions:
    - field: polymer_code
      operator: eq
      value: "HDPE"
    - field: process_types
      operator: contains
      value: "extrusion"
  produces:
    min_mfi:
      method: static
      value: 0.2
    max_mfi:
      method: static
      value: 4.0
  confidence: 0.76
