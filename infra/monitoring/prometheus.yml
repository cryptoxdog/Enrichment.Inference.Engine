global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'dev'
    environment: 'local'

scrape_configs:
  - job_name: 'enrichment-engine'
    static_configs:
      - targets:
          - 'host.docker.internal:8000'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    honor_labels: true
