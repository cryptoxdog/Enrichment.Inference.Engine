{{- if .Values.pdb.enabled }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: enrichment-api
  labels:
    {{- include "enrichment-api.labels" . | nindent 4 }}
spec:
  minAvailable: {{ .Values.pdb.minAvailable }}
  selector:
    matchLabels:
      {{- include "enrichment-api.selectorLabels" . | nindent 6 }}
{{- end }}
