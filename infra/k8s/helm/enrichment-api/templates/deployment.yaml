apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-api
  labels:
    {{- include "enrichment-api.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "enrichment-api.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "enrichment-api.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: enrichment-api
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8000
              protocol: TCP
          env:
            {{- range $key, $val := .Values.config }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  name: enrichment-config
                  key: {{ $key }}
            {{- end }}
            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: perplexity-api-key
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: api-secret-key
            - name: API_KEY_HASH
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret }}
                  key: api-key-hash
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 10
            periodSeconds: 5
          volumeMounts:
            - name: kb-data
              mountPath: /app/kb
              readOnly: true
      volumes:
        - name: kb-data
          configMap:
            name: enrichment-kb
            optional: true
