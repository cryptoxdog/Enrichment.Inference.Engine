apiVersion: v1
kind: Service
metadata:
  name: enrichment-api
  labels:
    {{- include "enrichment-api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "enrichment-api.selectorLabels" . | nindent 4 }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 8000
      protocol: TCP
