# Production defaults — single source of truth
replicaCount: 3

image:
  repository: ghcr.io/OWNER/domain-enrichment-api
  tag: "v2.2.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "POST, GET, OPTIONS"
    nginx.ingress.kubernetes.io/enable-cors: "true"
  hosts:
    - host: enrichment.example.com
      paths:
        - path: /api
          pathType: Prefix
  tls:
    - secretName: enrichment-tls
      hosts:
        - enrichment.example.com

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilization: 70
  targetMemoryUtilization: 80

pdb:
  enabled: true
  minAvailable: 2

config:
  REDIS_URL: "redis://redis:6379/0"
  KB_DIR: "/app/kb"
  LOG_LEVEL: "WARNING"
  PERPLEXITY_MODEL: "sonar-reasoning"
  DEFAULT_CONSENSUS_THRESHOLD: "0.65"
  DEFAULT_MAX_VARIATIONS: "5"
  DEFAULT_TIMEOUT_SECONDS: "120"
  MAX_CONCURRENT_VARIATIONS: "3"
  CB_FAILURE_THRESHOLD: "5"
  CB_COOLDOWN_SECONDS: "60"

secrets:
  existingSecret: enrichment-credentials

redis:
  enabled: true
  maxMemory: "128mb"

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values: ["enrichment-api"]
          topologyKey: kubernetes.io/hostname
