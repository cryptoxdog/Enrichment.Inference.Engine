apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: enrichment-api
spec:
  podSelector:
    matchLabels:
      app: enrichment-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8000
          protocol: TCP
  egress:
    # Allow DNS
    - to: []
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
    # Allow Perplexity API (HTTPS)
    - to: []
      ports:
        - port: 443
          protocol: TCP
    # Allow Redis in-cluster
    - to:
        - podSelector:
            matchLabels:
              app: redis
      ports:
        - port: 6379
          protocol: TCP
