apiVersion: apps/v1
kind: Deployment
metadata:
  name: enrichment-api
  labels:
    app: enrichment-api
    app.kubernetes.io/name: enrichment-api
    app.kubernetes.io/version: "2.2.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: enrichment-api
  template:
    metadata:
      labels:
        app: enrichment-api
    spec:
      serviceAccountName: enrichment-api
      containers:
        - name: api
          image: ghcr.io/OWNER/domain-enrichment-api:latest
          ports:
            - containerPort: 8000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: enrichment-config
          env:
            - name: PERPLEXITY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: enrichment-credentials
                  key: perplexity-api-key
            - name: API_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: enrichment-credentials
                  key: api-secret-key
            - name: API_KEY_HASH
              valueFrom:
                secretKeyRef:
                  name: enrichment-credentials
                  key: api-key-hash
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
          startupProbe:
            httpGet:
              path: /api/v1/health
              port: 8000
            failureThreshold: 10
            periodSeconds: 5
          volumeMounts:
            - name: kb-data
              mountPath: /app/kb
              readOnly: true
      volumes:
        - name: kb-data
          configMap:
            name: enrichment-kb
            optional: true
