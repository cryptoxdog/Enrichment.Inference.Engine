# Prometheus — scrapes enrichment-engine and OTel Collector
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    service: enrichment-engine
    environment: production

rule_files:
  - /etc/prometheus/alert_rules.yml

scrape_configs:
  - job_name: enrichment-engine
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: /metrics
    static_configs:
      - targets: ['api:8000']
        labels:
          service: enrichment-engine-api
          environment: production
    metric_relabel_configs:
      - source_labels: [__name__]
        regex: 'http_.*'
        action: keep
      - source_labels: [__name__]
        regex: 'neo4j_.*'
        action: keep
      - source_labels: [__name__]
        regex: 'redis_.*'
        action: keep

  - job_name: otel-collector
    static_configs:
      - targets: ['otel-collector:8888']
        labels:
          component: otel-collector

  - job_name: otel-collector-spans
    static_configs:
      - targets: ['otel-collector:8889']
        labels:
          component: otel-span-metrics
