# CHANGELOG v0.4.0 → v0.5.0
# ──────────────────────────
# BREAKING:
#   - COMPATIBLE_WITH_PROCESS edge: replaced optimal_mfi_min/max
#     with gating_properties[] array (GatingSpec schema)
#   - BUYER_ACCEPTS_GRADE concept: uses required_properties[] (GatingSpec)
#   - SourceType taxonomy: split into supply_class + recovery_class
#   - MaterialAttribute "repro" reclassified to supply_class: feedstock
#
# ADDED:
#   - GatingSpec: universal property-constraint schema
#   - KBGrade node label (KB overlay layer)
#   - KBContaminantSpec node label
#   - KBInferenceRule node label
#   - InferenceMetadata schema on engine nodes
#   - KB hot-reload with downstream invalidation
#   - Re-inference delta report endpoint
#   - Confidence scoring on all inferred fields
#
# UPGRADED:
#   - COMPATIBLE_WITH_PROCESS → gating_properties[]
#   - BUYER_ACCEPTS_GRADE (new) → required_properties[]
#   - Contamination limits → KBContaminantSpec nodes
#
# KILLED:
#   - KB_HAS_PROPERTY edge concept (scalars → node properties)
#   - SUITABLE_FOR_APPLICATION edge concept (→ node property arrays)
#   - Flat contamination limit edge concept (→ KBContaminantSpec)
#
# MODIFIED:
#   - SourceType taxonomy: new classification model
#   - MaterialAttribute taxonomy: repro moved out
#   - Polymer node: added polymer_tier property
#   - Facility node: replaced min_mfi/max_mfi with process_gating[]
