version: "3.9"

# ── L9 Enrichment Constellation — Single-VPS Production ──────────
# Runs: ENRICH + supporting infrastructure on one VPS.
# GRAPH and SCORE are separate deployments; referenced by URL.
# Secrets must be set in .env before deployment.

services:

  # ── ENRICH Service ──────────────────────────────────────────────
  enrich:
    image: l9-enrich:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - ENRICH_API_KEY=${ENRICH_API_KEY}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY}
      - NEO4J_URI=${NEO4J_URI:-bolt://neo4j:7687}
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://enrich:${POSTGRES_PASSWORD}@postgres:5432/enrich}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - GRAPH_NODE_URL=${GRAPH_NODE_URL}
      - SCORE_NODE_URL=${SCORE_NODE_URL}
      - ROUTE_NODE_URL=${ROUTE_NODE_URL}
      - INTER_NODE_SECRET=${INTER_NODE_SECRET}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - ENVIRONMENT=production
      - DOMAINS_DIR=/app/domains
      - DEFAULT_DOMAIN=${DEFAULT_DOMAIN:-plasticos}
    ports:
      - "${ENRICH_PORT:-8000}:8000"
    volumes:
      - ./kb:/app/kb:ro
      - ./domains:/app/domains:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "1.0"

  # ── PostgreSQL ───────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      - POSTGRES_USER=enrich
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=enrich
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U enrich"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Redis ────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 384M

  # ── Neo4j ────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc","graph-data-science"]
      - NEO4J_server_memory_heap_initial__size=512m
      - NEO4J_server_memory_heap_max__size=1g
      - NEO4J_server_memory_pagecache_size=512m
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    ports:
      - "7474:7474"
      - "7687:7687"
    healthcheck:
      test: ["CMD", "wget", "-q", "http://localhost:7474", "-O", "/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 90s
    deploy:
      resources:
        limits:
          memory: 2G

  # ── DB Migration (runs once at deploy) ───────────────────────────
  migrate:
    image: l9-enrich:${IMAGE_TAG:-latest}
    command: ["alembic", "upgrade", "head"]
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://enrich:${POSTGRES_PASSWORD}@postgres:5432/enrich}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
