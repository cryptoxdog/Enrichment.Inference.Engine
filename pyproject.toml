[project]
name = "domain-enrichment-api"
version = "2.2.0"
description = "Universal domain-aware entity enrichment API — Salesforce + Odoo single ingress"
requires-python = ">=3.11"
dependencies = [
    "aiofiles>=23.0.0",
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "httpx>=0.27.0",
    "pydantic>=2.9.0",
    "pydantic-settings>=2.6.0",
    "pyyaml>=6.0",
    "redis>=5.0.0",
    "structlog>=24.0.0",
    "perplexityai>=0.2.0",
]

[project.optional-dependencies]
dev = [
    "pytest==8.3.5",
    "pytest-asyncio>=0.24",
    "pytest-httpx>=0.34",
    "pytest-cov==6.0.0",
    "respx>=0.22",
    "ruff==0.15.5",
    "mypy==1.14.0",
    "coverage==7.6.0",
]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.mypy]
python_version = "3.12"

[tool.pytest.ini_options]
asyncio_mode = "auto"
