# Repository Contract Pairs Catalog — Enrichment.Inference.Engine
# =================================================================
# Enforces method/param call validity repo-wide via AST scanning.
# Revised for SDK transport runtime constitution.
#
# Active constitutional truth:
# - /v1/execute is SDK-owned
# - SDK handler registration is canonical
# - Gate/transport actions are canonical
#
# Deprecated compatibility artifacts:
# - chassis/envelope.py
# - chassis/router.py
# - chassis/registry.py
#
# Local envelope/router semantics are not active constitutional enforcement targets.

schema_version: "2.0.0"

dora_metadata:
  created_at: "2026-03-25T00:00:00Z"
  updated_at: "2026-04-11T00:00:00Z"
  updated_by: "l9-review-remediation"
  purpose: "Repository-wide method/param contract enforcement for SDK transport runtime"

scan:
  include_globs:
    - "**/*.py"
  exclude_globs:
    - ".venv/**"
    - ".git/**"
    - "node_modules/**"
    - "__pycache__/**"
    - ".mypy_cache/**"
    - ".pytest_cache/**"
    - ".ruff_cache/**"
    - "htmlcov/**"
    - "tests/fixtures/**"

pairs:
  # ── SDK Runtime Registration: canonical action registration ─────
  - method: "register_handler"
    param: "action"
    allowed_literals:
      - "enrich"
      - "enrichbatch"
      - "converge"
      - "discover"
      - "simulate"
      - "writeback"
      - "enrich-and-sync"
      - "graph-inference-result"
      - "community-export"
      - "schema-proposal"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "SDK runtime action must be from the active registered action set"

  # ── SDK Runtime Config: allowed_actions constitutional bundle ───
  - method: "NodeRuntimeConfig"
    param: "allowed_actions"
    allowed_literals:
      - "community-export"
      - "converge"
      - "discover"
      - "enrich"
      - "enrich-and-sync"
      - "enrichbatch"
      - "graph-inference-result"
      - "schema-proposal"
      - "simulate"
      - "writeback"
    dynamic_policy: "prove_dynamic"
    severity: "error"
    description: "SDK runtime allowed_actions must match the active transport/runtime constitution"

  # ── Gate Transport: Graph sync client action set ────────────────
  - method: "_build_packet"
    param: "action"
    allowed_literals:
      - "sync"
      - "match"
      - "outcome"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "GraphSyncClient packet action must be from the canonical Gate transport action set"

  # ── ScoreDimension enum enforcement ─────────────────────────────
  - method: "ScoreDimensionResult"
    param: "dimension"
    allowed_literals:
      - "fit"
      - "intent"
      - "engagement"
      - "readiness"
      - "graph_affinity"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "Score dimension must be from ScoreDimension enum"

  # ── FieldSource enum enforcement ────────────────────────────────
  - method: "FieldConfidence"
    param: "source"
    allowed_literals:
      - "crm"
      - "enrichment"
      - "inference"
      - "manual"
      - "seed"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "FieldConfidence source must be from FieldSource enum"

  # ── HealthAction enum enforcement ───────────────────────────────
  - method: "HealthRecommendation"
    param: "action"
    allowed_literals:
      - "re_enrich"
      - "verify_field"
      - "resolve_conflict"
      - "fill_missing"
      - "refresh_stale"
      - "flag_outlier"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "Health recommendation action must be from HealthAction enum"

  # ── AssessmentScope enum enforcement ────────────────────────────
  - method: "assess"
    param: "scope"
    allowed_literals:
      - "full"
      - "incremental"
      - "entity"
      - "field"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "Assessment scope must be from AssessmentScope enum"

  # ── ConvergenceMode enum enforcement ────────────────────────────
  - method: "ConvergeRequest"
    param: "mode"
    allowed_literals:
      - "discovery"
      - "targeted"
      - "verification"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "Convergence mode must be from ConvergenceMode enum"

  # ── LoopStatus enum enforcement ─────────────────────────────────
  - method: "LoopState"
    param: "status"
    allowed_literals:
      - "running"
      - "converged"
      - "budget_exhausted"
      - "max_passes"
      - "diminishing_returns"
      - "human_hold"
      - "failed"
    dynamic_policy: "hybrid_warn"
    severity: "error"
    description: "Loop status must be from LoopStatus enum"

dynamic_sources:
  allow_patterns:
    - kind: "enum_member"
      pattern: "ScoreDimension.*"
      trust_level: "proven"
    - kind: "enum_member"
      pattern: "FieldSource.*"
      trust_level: "proven"
    - kind: "enum_member"
      pattern: "HealthAction.*"
      trust_level: "proven"
    - kind: "enum_member"
      pattern: "AssessmentScope.*"
      trust_level: "proven"
    - kind: "enum_member"
      pattern: "ConvergenceMode.*"
      trust_level: "proven"
    - kind: "enum_member"
      pattern: "LoopStatus.*"
      trust_level: "proven"
    - kind: "variable"
      pattern: "action"
      trust_level: "semi_proven"

baseline:
  file: "config/contracts/contract_baseline_counts.json"
  drift_threshold_percent: 10
  drift_policy: "warn"

deprecated_compatibility_artifacts:
  - path: "chassis/envelope.py"
    status: "deprecated"
    enforcement_mode: "informational_only"
  - path: "chassis/router.py"
    status: "deprecated"
    enforcement_mode: "informational_only"
  - path: "chassis/registry.py"
    status: "deprecated"
    enforcement_mode: "informational_only"
