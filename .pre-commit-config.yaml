# --- L9_META ---
# l9_schema: 1
# origin: l9-template
# engine: enrichment
# layer: [governance]
# tags: [L9_TEMPLATE, precommit]
# owner: platform
# status: active
# --- /L9_META ---
#
# Pre-commit hooks — mechanical enforcement before commit
# Install: pre-commit install
# Run manually: pre-commit run --all-files
#
# Sibling parity: Cognitive.Engine.Graphs/.pre-commit-config.yaml

repos:
  # ── Basic file checks ───────────────────────────────────────────────
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents, --unsafe]
        exclude: >
          (?x)^(
            \.github/.*\.yml|
            infra/k8s/helm/.*\.yaml
          )$
      - id: check-added-large-files
        args: [--maxkb=1000]

  # ── Code formatting ──────────────────────────────────────────────────
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.5
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # ── Secrets scanning ─────────────────────────────────────────────────
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
        args: ["protect", "--staged", "--config=.gitleaks.toml"]

  # ── Type checking ────────────────────────────────────────────────────
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.14.0
    hooks:
      - id: mypy
        args: [--ignore-missing-imports]
        additional_dependencies: [pydantic, pydantic-settings, types-PyYAML, structlog, httpx]
        exclude: ^(tests/|tools/|docs/|kb/|readme/)

  # ── Unit tests (fast subset for pre-commit) ─────────────────────────
  - repo: local
    hooks:
      - id: pytest-unit
        name: pytest unit tests
        entry: bash -c 'PYTHONPATH="${PYTHONPATH}:." python3 -m pytest tests/ -m "unit" --tb=short -q 2>/dev/null || true'
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-commit]

  # ── Security: Block raw FastAPI imports in engine modules ────────────
  - repo: local
    hooks:
      - id: block-fastapi-in-engine
        name: Block FastAPI imports in engine modules
        entry: >
          bash -c 'if git diff --cached --name-only | grep "^app/.*\.py$" |
          grep -v "app/api/" | grep -v "app/main.py" | grep -v "handlers.py" |
          xargs grep -l "from fastapi import\|import fastapi" 2>/dev/null |
          grep -q .; then
          echo "ERROR: FastAPI imports found in engine modules (only app/api/, app/main.py, handlers.py allowed)";
          exit 1; fi'
        language: system
        pass_filenames: false

  # ── L9 contract enforcement ──────────────────────────────────────────
  - repo: local
    hooks:
      - id: l9-contract-audit
        name: L9 Contract Audit
        entry: bash -c 'if [ -f tools/audit_engine.py ]; then python tools/audit_engine.py --strict; fi'
        language: python
        pass_filenames: false
        always_run: true
      - id: l9-contract-verify
        name: L9 Contract Verification
        entry: bash -c 'if [ -f tools/verify_contracts.py ]; then python tools/verify_contracts.py; fi'
        language: python
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  # ── Terminology guard (canonical terms: list[T], T | None) ──────────
  - repo: local
    hooks:
      - id: terminology-guard
        name: Check Terminology Consistency
        entry: >
          bash -c '
          VIOLATIONS=0;
          for pattern in "\\bprint\\(" "\\bOptional\\[" "\\bList\\[" "\\bDict\\["; do
            if git diff --cached --name-only | grep "\.py$" | grep -E "^(app|tests)/" |
               xargs grep -l -P "$pattern" 2>/dev/null | grep -v __pycache__ | grep -q .; then
              echo "Found forbidden term: $pattern";
              VIOLATIONS=$((VIOLATIONS+1));
            fi;
          done;
          [ $VIOLATIONS -eq 0 ] || { echo "Use: list[T], T | None, structlog"; exit 1; };
          exit 0'
        language: system
        pass_filenames: false
