channel_name: "enrich:events:{tenant_id}"
backend: redis_streams
direction: publish
description: |
  Tenant-scoped Redis Stream. One stream per tenant.
  Consumers read via XREAD/XREADGROUP.

event_types:
  - enrichment_completed
  - enrichment_failed
  - convergence_completed
  - schema_proposed
  - score_invalidated
  - entity_updated

source_file: app/services/event_emitter.py
emitter_class: EventEmitter
backend_class: RedisStreamsBackend

# Delivery guarantees (Phase 1.4)
delivery:
  guarantee: at_most_once  # fire-and-forget, no retries
  ordering: per_tenant_stream
  retry_policy: none
  dead_letter: null

