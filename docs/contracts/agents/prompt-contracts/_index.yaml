prompts:
  - name: enrichment_prompt
    builder: prompt_builder.build_prompt
    source_file: app/services/prompt_builder.py
    model_target: sonar-reasoning
    description: |
      Core enrichment prompt for Perplexity Sonar. Builds a structured system
      prompt with schema definition, field types, and output format example.
      Supports SYSTEM_USER_ASSISTANT strategy for injecting known fields.
    
    system_template: |
      You are a domain research analyst. Your task is to research
      the given entity and extract structured data matching the requested schema.

      RULES:
      1. Return ONLY valid JSON — no markdown fences, no commentary, no explanation.
      2. Your response must be a JSON object with exactly two top-level keys:
         - "confidence": a float between 0.0 and 1.0 indicating your overall certainty
         - "fields": an object containing the requested field values
      3. Base answers on verifiable, current facts. If uncertain, lower confidence.
      4. For list fields, return arrays of non-empty strings.
      5. For boolean fields, return true or false (not strings).
      6. If you cannot determine a field value with any confidence, omit it from "fields".
      7. Never fabricate data. Absence is better than hallucination.

      EXAMPLE OUTPUT FORMAT:
      {"confidence": 0.82, "fields": {"Industry": "Plastics Recycling", "employee_count": 150}}
      {kb_context}
      TARGET SCHEMA:
      {schema_block}

    input_variables:
      - name: entity
        type: dict
        description: Current entity field values (all non-empty fields passed)
        required: true
      - name: object_type
        type: string
        description: Source object API name (Account, Lead, res.partner, etc.)
        required: true
      - name: objective
        type: string
        description: Natural language enrichment objective
        required: true
      - name: target_schema
        type: dict
        description: "Target field schema {field_name: type}"
        required: false
      - name: kb_context_text
        type: string
        description: KB fragments to inject as context
        required: false
      - name: sonar_config
        type: SonarConfig
        description: Message strategy config for prompt structure
        required: false

    output_format:
      type: json
      schema:
        confidence:
          type: float
          range: [0.0, 1.0]
        fields:
          type: object
          description: Extracted field values matching target schema

  - name: meta_prompt_plan
    builder: MetaPromptPlanner.plan_pass
    source_file: app/engines/meta_prompt_planner.py
    model_target: sonar-reasoning
    description: |
      Adaptive prompt strategy planner for convergence loop. Analyzes entity
      state (field coverage, confidence, uncertainty) and determines:
      - Enrichment mode: discovery / targeted / verification
      - Priority fields to focus on
      - KB fragments to inject
      - Optimal variation budget (1-5 variations)

    modes:
      discovery:
        description: Initial pass, broad exploration of entity
        trigger: pass_number == 1 OR uncertainty_score > 7.0
        variation_budget: 3-5
      targeted:
        description: Focused on specific missing/low-confidence fields
        trigger: 2 <= pass_number <= 4 AND uncertainty_score in [3.0, 7.0]
        variation_budget: 2-3
      verification:
        description: Final validation of high-confidence fields
        trigger: pass_number >= 5 OR uncertainty_score < 3.0
        variation_budget: 1-2

    input_variables:
      - name: entity_state
        type: dict
        description: Current entity field values
        required: true
      - name: pass_context
        type: PassContext
        description: Pass number, budget remaining, previous results
        required: true
      - name: field_confidences
        type: dict
        description: Per-field confidence scores (0.0-1.0)
        required: true
      - name: uncertainty_score
        type: float
        description: Aggregate uncertainty metric
        required: true

    output:
      type: PromptPlan
      fields:
        mode:
          type: string
          enum: [discovery, targeted, verification]
        priority_fields:
          type: array
          max_items: 10
          description: Top fields to prioritize in prompt
        kb_fragment_ids:
          type: array
          description: KB fragments to inject
        variation_count:
          type: integer
          range: [1, 5]
        pass_number:
          type: integer
        reasoning:
          type: string
          description: Human-readable explanation of plan

  - name: assistant_context
    builder: prompt_builder._build_assistant_context
    source_file: app/services/prompt_builder.py
    description: |
      Builds an assistant message summarizing known fields from prior passes.
      Primes the model with existing knowledge so targeted passes focus on gaps.
    
    template: |
      I already have the following verified data for this entity:
        {field}: {value}
        ...
      
      Focus your research on the fields I'm still missing from the target schema.

    input_variables:
      - name: entity
        type: dict
        description: Entity with known field values
        required: true

    output:
      type: string
      description: Assistant context message or None if no known fields
