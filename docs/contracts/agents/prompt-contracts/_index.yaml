# NOTE: Prompt templates are constructed dynamically by PromptBuilder and
# MetaPromptPlanner at runtime. No static .j2 or .txt prompt files exist.
# Prompt contracts are implicit in:
#   - app/services/prompt_builder.py: PromptBuilder.build(entity, objective, kb_context, schema)
#   - app/engines/meta_prompt_planner.py: MetaPromptPlanner.plan(entity, domain, pass_number)
#   - app/services/enrichment/sources/perplexity_adapter.py: request construction

prompts:
  - name: enrichment_prompt
    builder: PromptBuilder.build
    source_file: app/services/prompt_builder.py
    model_target: sonar-reasoning
    input_variables:
      - name: entity
        type: dict
        description: Current entity field values
        required: true
      - name: objective
        type: string
        description: Natural language enrichment objective
        required: true
      - name: kb_context
        type: string
        description: KB fragments to inject as context
        required: false
      - name: schema
        type: dict
        description: Target field schema {field_name: type}
        required: false
    output_format:
      type: json
      description: Structured field values matching the target schema
    # TODO: Extract exact prompt template text from app/services/prompt_builder.py — verify manually

  - name: meta_prompt
    builder: MetaPromptPlanner.plan
    source_file: app/engines/meta_prompt_planner.py
    model_target: sonar-reasoning
    description: |
      Per-pass prompt generated by the meta-planner during convergence loops.
      Adapts based on current pass number, accumulated confidence, and domain spec.
    # TODO: Extract exact meta-prompt strategy from MetaPromptPlanner — verify manually

