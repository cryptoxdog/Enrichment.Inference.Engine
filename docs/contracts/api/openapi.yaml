# ═══════════════════════════════════════════════════════════════
# Contract: Unified OpenAPI Specification
# Source:   app/main.py, app/api/v1/*, app/models/schemas.py
# Version:  2.4.0
# Updated:  2026-04-11
# ═══════════════════════════════════════════════════════════════
#
# NOTE: This spec documents ONLY implemented routes.
# Unimplemented routes have been removed for contract accuracy.
# See TODO comments for planned endpoints.

openapi: "3.1.0"

info:
  title: L9 ENRICH — Domain Enrichment API
  version: "2.4.0"
  description: |
    Universal domain-aware entity enrichment. Layer 2 of the L9 three-layer
    intelligence stack. Serves Salesforce Apex callouts, Odoo async_executor,
    and any L9 constellation node via PacketEnvelope.

    ## Authentication
    All endpoints (except GET /api/v1/health) require an `X-API-Key` header.
    The raw key is SHA-256 hashed and compared against `API_KEY_HASH` using
    constant-time comparison (`hmac.compare_digest`).

    ## Rate Limiting
    Global: 120 requests/minute per client IP.
    Source: `app/middleware/rate_limiter.py`
  contact:
    name: L9 Enrichment Engine
    url: https://github.com/cryptoxdog/Enrichment.Inference.Engine

servers:
  - url: http://localhost:8000
    description: Local development
  - url: https://enrich.yourdomain.com
    description: Production

security:
  - ApiKeyAuth: []

components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        SHA-256-hashed API key. Callers send the raw key; the server hashes and
        compares. Source: app/core/auth.py

  schemas:
    ErrorResponse:
      title: ErrorResponse
      type: object
      properties:
        detail:
          type: string
          description: Error message
        error:
          type: string
        message:
          type: string
        request_id:
          type: string

    HealthCheckResponse:
      title: HealthCheckResponse
      type: object
      properties:
        status:
          type: string
          enum: [ok, degraded]
          example: ok
        version:
          type: string
          example: "2.4.0"
        kb_loaded:
          type: boolean
          description: Whether the knowledge base index is loaded.
        kb_polymers:
          type: integer
          description: Number of polymer types in the KB.
        kb_grades:
          type: integer
          description: Total grade entries in the KB.
        kb_rules:
          type: integer
          description: Total inference rules loaded.
        circuit_breaker_state:
          type: string
          enum: [closed, open, half-open]
          description: Circuit breaker state for external API calls.
      x-source-file: app/models/schemas.py

    AttestationResponse:
      title: AttestationResponse
      type: object
      properties:
        node_id:
          type: string
        version:
          type: string
        contract_version:
          type: string
        capabilities:
          type: array
          items:
            type: string
        attestation_hash:
          type: string
      x-source-file: app/api/v1/attestation.py

    ConvergeRequest:
      title: ConvergeRequest
      description: Single entity convergence loop request.
      type: object
      required:
        - entity_id
        - domain
      properties:
        entity_id:
          type: string
          description: The entity to converge.
        domain:
          type: string
          description: Domain YAML identifier (e.g., 'plasticos').
        max_passes:
          type: integer
          default: 5
          description: Maximum convergence passes.
        profile_id:
          type: string
          nullable: true
          description: Enrichment profile ID.
      x-source-file: app/api/v1/converge.py
      additionalProperties: false

    ConvergeResponse:
      title: ConvergeResponse
      type: object
      properties:
        run_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [converged, max_passes_reached, budget_exceeded, failed]
        pass_count:
          type: integer
        final_fields:
          type: object
        total_tokens:
          type: integer
        total_cost_usd:
          type: number

    BatchConvergeRequest:
      title: BatchConvergeRequest
      type: object
      properties:
        entity_ids:
          type: array
          items:
            type: string
          maxItems: 100
        domain:
          type: string
        profile_id:
          type: string
          nullable: true

    ApprovalRequest:
      title: ApprovalRequest
      type: object
      required:
        - approved
        - reviewed_by
      properties:
        approved:
          type: boolean
        reviewed_by:
          type: string
          description: Identity of the reviewer.
      x-source-file: app/api/v1/converge.py
      additionalProperties: false

    ScanRequest:
      title: ScanRequest
      description: CRM field scan request for Seed tier entry point.
      type: object
      required:
        - fields
        - domain
        - tenant_id
      properties:
        fields:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              type:
                type: string
              sample_values:
                type: array
                items: {}
                nullable: true
              fill_rate:
                type: number
                nullable: true
        domain:
          type: string
          example: plasticos
        tenant_id:
          type: string
          example: acme-corp
      x-source-file: app/api/v1/converge.py
      additionalProperties: false

  responses:
    Unauthorized:
      description: Missing X-API-Key header
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "Missing X-API-Key header"
    Forbidden:
      description: Invalid API key
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "Invalid API key"
    ValidationError:
      description: Request validation error (Pydantic)
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
          example:
            detail: "Internal enrichment error"

paths:
  # ── Health ───────────────────────────────────────────────────
  /api/v1/health:
    get:
      operationId: getHealth
      summary: Health check — KB + circuit breaker status
      description: |
        Returns service health, API version, KB load status, and circuit breaker state.
        Does NOT require authentication.
      tags: [health]
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthCheckResponse"
              example:
                status: ok
                version: "2.4.0"
                kb_loaded: true
                kb_polymers: 12
                kb_grades: 47
                kb_rules: 23
                circuit_breaker_state: closed
      x-source-file: app/main.py

  # ── Attestation ──────────────────────────────────────────────
  /attestation:
    get:
      operationId: getAttestation
      summary: Runtime attestation — node identity and capabilities
      description: |
        Returns the node's runtime attestation including identity, version,
        contract version, and declared capabilities.
      tags: [attestation]
      responses:
        "200":
          description: Attestation response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttestationResponse"
      x-source-file: app/api/v1/attestation.py

  # ── Convergence ──────────────────────────────────────────────
  /converge:
    post:
      operationId: convergeEntity
      summary: Run single entity convergence loop
      description: |
        Executes a multi-pass enrichment-inference convergence loop for a single entity.
        Runs up to `max_passes` enrichment passes, accumulating field confidence until
        the loop converges (confidence plateau, budget exceeded, or max passes reached).
        Returns the loop state and final accumulated fields.
      tags: [convergence]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConvergeRequest"
      responses:
        "200":
          description: Convergence loop result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConvergeResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"
        "500":
          $ref: "#/components/responses/InternalError"
      x-source-file: app/api/v1/converge.py

  /converge/batch:
    post:
      operationId: convergeBatch
      summary: Batch convergence with profile-based selection
      tags: [convergence]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/BatchConvergeRequest"
      responses:
        "200":
          description: Batch convergence initiated
          content:
            application/json:
              schema:
                type: object
      x-source-file: app/api/v1/converge.py

  /converge/{run_id}:
    get:
      operationId: getConvergeStatus
      summary: Check convergence loop progress
      tags: [convergence]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: The convergence run UUID.
      responses:
        "200":
          description: Loop state
          content:
            application/json:
              schema:
                type: object
        "404":
          description: Run ID not found
      x-source-file: app/api/v1/converge.py

  /converge/{run_id}/approve:
    post:
      operationId: approveConvergeProposal
      summary: Human approval for schema proposals
      tags: [convergence]
      parameters:
        - name: run_id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalRequest"
      responses:
        "200":
          description: Approval recorded
      x-source-file: app/api/v1/converge.py

  /converge/proposals/{domain}:
    get:
      operationId: getConvergeProposals
      summary: Get pending schema proposals for a domain
      tags: [convergence]
      parameters:
        - name: domain
          in: path
          required: true
          schema:
            type: string
          example: plasticos
      responses:
        "200":
          description: Pending proposals
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
      x-source-file: app/api/v1/converge.py

  # ── CRM Scan ─────────────────────────────────────────────────
  /scan:
    post:
      operationId: scanCRMFields
      summary: CRM field scan — Seed tier entry point
      description: |
        Scans CRM field metadata against the domain YAML spec. Returns coverage ratio,
        missing fields, enrichment candidates, and cost estimates. This is the primary
        "Seed tier" entry point for onboarding new CRM instances.
      tags: [discover]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ScanRequest"
            example:
              fields:
                - name: company_name
                  type: string
                  sample_values: ["Acme Corp", "Plastics Inc"]
                  fill_rate: 0.98
                - name: industry
                  type: string
                  fill_rate: 0.72
              domain: plasticos
              tenant_id: acme-corp
      responses:
        "200":
          description: CRM field scan result
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
        "401":
          $ref: "#/components/responses/Unauthorized"
        "500":
          $ref: "#/components/responses/InternalError"
      x-source-file: app/api/v1/converge.py

tags:
  - name: health
    description: Service health monitoring
  - name: attestation
    description: Runtime attestation and node identity
  - name: convergence
    description: Multi-pass convergence loop management
  - name: discover
    description: Schema discovery and CRM field scanning

