service_name: Neo4j
type: internal
protocol: bolt
auth_method: Username + password (NEO4J_USER, NEO4J_PASSWORD)
connection_env: NEO4J_URI
user_env: NEO4J_USER
password_env: NEO4J_PASSWORD
default_uri: bolt://localhost:7687

usages:
  - purpose: Entity graph persistence after enrichment
    source_file: app/engines/graph_sync_client.py

  - purpose: KGE hyper-relational encoding
    source_file: engine/kge/hyper_relational_encoder.py

  - purpose: Neuro-symbolic inference
    source_file: engine/kge/neuro_symbolic_engine.py

  - purpose: RotatE3D link prediction
    source_file: engine/kge/rotate3d.py

