service_name: SalesforceCRM
type: external
protocol: http  # simple-salesforce library
auth_method: OAuth2 (client_credentials or password flow)
auth_env_vars:
  - SALESFORCE_CLIENT_ID
  - SALESFORCE_CLIENT_SECRET
  - SALESFORCE_USERNAME
  - SALESFORCE_PASSWORD
  - SALESFORCE_SECURITY_TOKEN

role: |
  CRM consumer #2. Salesforce integration:
  - EnrichmentCalloutService.cls (Apex) calls POST /api/v1/enrich
  - EnrichmentWriteBack.cls reads `fields` from response
  - EnrichmentRunLogger.cls reads all provenance fields from response

field_mapping: config/crm/salesforce_mapping.yaml
source_file: app/services/crm/salesforce_client.py

