name: AI Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  ai-review:
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install httpx
        run: pip install httpx

      - name: Generate PR diff
        run: |
          git diff origin/${{ github.base_ref }}...HEAD -- '*.py' '*.yaml' '*.yml' '*.toml' > pr_diff.txt
          echo "DIFF_SIZE=$(wc -c < pr_diff.txt | tr -d ' ')" >> $GITHUB_ENV

      - name: AI Review
        if: env.DIFF_SIZE != '0'
        env:
          PERPLEXITY_API_KEY: ${{ secrets.PERPLEXITY_API_KEY }}
        run: python scripts/ai_review.py --mode file --diff-path pr_diff.txt --no-block

      - name: Upload review
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-review
          path: pr_diff.txt
