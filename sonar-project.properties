# SonarQube Cloud — static analysis + coverage (CI generates coverage.xml)
# Organization + project key are passed from GitHub Actions (-D) using repo variables
# SONAR_ORG_KEY and SONAR_PROJECT_KEY (see .github/workflows/sonarcloud.yml).
#
# Local: run scanner with -Dsonar.organization=... -Dsonar.projectKey=... or paste keys here temporarily.

sonar.sources=app,engine
sonar.tests=tests
sonar.test.inclusions=**/test_*.py,**/*_test.py
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml
# local_pr_pipeline/: excluded if present (legacy path); harmless if absent
sonar.exclusions=**/node_modules/**,**/venv/**,**/.venv/**,**/build/**,**/dist/**,**/artifacts/**,local_pr_pipeline/**,tools/sync_github_actions_secrets.sh,scripts/l9_contract_control.py,**/__pycache__/**,**/htmlcov/**,.git/**
sonar.test.exclusions=tests/**
sonar.coverage.exclusions=tests/**,**/test_*.py,**/__init__.py
