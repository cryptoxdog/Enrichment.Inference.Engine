# Alembic — schema migrations
# LAST_REVIEWED: 2026-04-11
# sqlalchemy.url below is a local default only; override with:
#   alembic -x sqlalchemy.url=postgresql+asyncpg://user:pass@host:5432/db upgrade head
# or set DATABASE_URL in the environment when using app tooling (see app/core/config.py Settings.database_url).

[alembic]
script_location = migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = postgresql+asyncpg://enrich:changeme@localhost:5432/enrich

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
